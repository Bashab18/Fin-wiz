databases:
  - name: digifinwiz-db
    plan: free
    region: oregon

services:
  - type: web
    name: digifinwiz
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: ALLOWED_ORIGIN
        value: "https://digifinwiz.netlify.app"
      - key: DATABASE_URL
        fromDatabase:
          name: digifinwiz-db
          property: connectionString
    autoDeploy: true
